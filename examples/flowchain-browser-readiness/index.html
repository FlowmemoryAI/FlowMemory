<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FlowChain Browser Readiness Example</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; color: #172033; background: #f7f8fb; }
      main { max-width: 760px; }
      label, input, button { font: inherit; }
      input { width: min(100%, 34rem); padding: 0.5rem; }
      button { padding: 0.5rem 0.75rem; }
      pre { white-space: pre-wrap; background: #fff; border: 1px solid #ccd3df; padding: 1rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>FlowChain Browser Readiness</h1>
      <p>This example calls only public-safe discovery and readiness endpoints.</p>
      <label>
        RPC origin
        <input id="origin" value="http://127.0.0.1:8787">
      </label>
      <button id="check" type="button">Check</button>
      <pre id="output">Idle</pre>
    </main>
    <script type="module">
      const output = document.querySelector("#output");
      const origin = document.querySelector("#origin");
      const redact = (value) => String(value).replace(/(https?:\/\/)([^/@\s]+@)/gi, "$1REDACTED@");
      const getJson = async (path) => {
        const base = origin.value.replace(/\/+$/, "");
        const response = await fetch(`${base}${path}`, { headers: { accept: "application/json" } });
        const body = await response.json();
        return { status: response.status, body };
      };
      document.querySelector("#check").addEventListener("click", async () => {
        output.textContent = "Checking...";
        try {
          const discovery = await getJson("/rpc/discover");
          const readiness = await getJson("/rpc/readiness");
          output.textContent = JSON.stringify({
            schema: "flowchain.example.browser_readiness.v0",
            rpcOrigin: redact(origin.value),
            discoveryStatus: discovery.status,
            readinessStatus: readiness.status,
            methodCount: discovery.body.methodCount,
            publicRpcReady: readiness.body.publicRpcReady === true,
            productionReady: readiness.body.productionReady === true,
            noSecrets: true
          }, null, 2);
        } catch (error) {
          output.textContent = JSON.stringify({
            schema: "flowchain.example.browser_readiness_error.v0",
            message: error instanceof Error ? redact(error.message) : redact(error),
            noSecrets: true
          }, null, 2);
        }
      });
    </script>
  </body>
</html>
