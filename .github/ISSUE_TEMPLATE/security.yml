name: Security
description: Report or track protocol, service, hardware, crypto, or operational security work.
title: "[Security]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Do not include live secrets, private keys, seed phrases, or exploitable private details in public issue text.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Protocol
        - Contracts
        - Indexer or verifier
        - AI memory
        - Hardware
        - Infrastructure
        - Supply chain
        - Other
    validations:
      required: true
  - type: textarea
    id: concern
    attributes:
      label: Concern
      description: What is the security concern?
    validations:
      required: true
  - type: textarea
    id: allowed_folders
    attributes:
      label: Allowed Folders
      description: Which folders may be edited for this security task?
      placeholder: |
        - docs/SECURITY_MODEL.md
        - .github/
    validations:
      required: true
  - type: textarea
    id: forbidden_folders
    attributes:
      label: Forbidden Folders
      description: Which folders or risky actions are out of scope?
      placeholder: |
        - production deployment config
        - private keys or live credentials
        - tokenomics
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What could go wrong if this is real?
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What must be true before this can close?
      placeholder: |
        - The affected trust boundary is documented.
        - No live secrets are exposed.
        - Mitigation or next investigation step is clear.
    validations:
      required: true
  - type: dropdown
    id: risk_level
    attributes:
      label: Risk Level
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: dropdown
    id: recommended_agent_worktree
    attributes:
      label: Recommended Agent / Worktree
      options:
        - 'Review / maintenance'
        - 'Protocol contracts'
        - 'Services indexer/verifier'
        - 'Hardware'
        - 'Crypto'
        - 'Chain/devnet research'
    validations:
      required: true
  - type: textarea
    id: recommendation
    attributes:
      label: Recommendation
      description: Proposed fix, mitigation, or next investigation step.
    validations:
      required: false
