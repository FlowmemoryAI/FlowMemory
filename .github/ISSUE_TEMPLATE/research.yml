name: Research
description: Track AI memory, neural geometry, protocol, reliability, or applied research.
title: "[Research]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Use this for research questions, hypotheses, experiments, and literature notes. Mark unknowns as unknowns.
  - type: textarea
    id: question
    attributes:
      label: Research Question
      description: What are we trying to learn?
    validations:
      required: true
  - type: textarea
    id: allowed_folders
    attributes:
      label: Allowed Folders
      description: Which folders may be edited?
      placeholder: |
        - research/
        - docs/DECISIONS/
        - docs/ARCHITECTURE.md
    validations:
      required: true
  - type: textarea
    id: forbidden_folders
    attributes:
      label: Forbidden Folders
      description: Which folders or claims are out of scope?
      placeholder: |
        - contracts/
        - services/
        - apps/
        - production deployment plans
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What project context, prior work, or source material matters?
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What must be true before this can close?
      placeholder: |
        - Hypotheses are separated from accepted decisions.
        - Unknowns are listed.
        - Follow-up implementation issues are separate.
    validations:
      required: true
  - type: dropdown
    id: risk_level
    attributes:
      label: Risk Level
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: dropdown
    id: recommended_agent_worktree
    attributes:
      label: Recommended Agent / Worktree
      options:
        - 'Research - E:\FlowMemory\flowmemory-research'
        - 'Review / maintenance - E:\FlowMemory\flowmemory-review'
        - 'Crypto - E:\FlowMemory\flowmemory-crypto'
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Expected Output
      description: Paper note, decision record, experiment result, prototype, or other artifact.
    validations:
      required: true
