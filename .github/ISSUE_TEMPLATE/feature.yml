name: Feature
description: Propose a FlowMemory product, protocol, service, app, or infra feature.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this for scoped implementation proposals. Keep heavy data, secrets, and private credentials out of issues.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should exist after this feature is complete?
    validations:
      required: true
  - type: textarea
    id: allowed_folders
    attributes:
      label: Allowed Folders
      description: Which directories, systems, or interfaces are in scope?
      placeholder: |
        - contracts/
        - tests/
    validations:
      required: true
  - type: textarea
    id: forbidden_folders
    attributes:
      label: Forbidden Folders
      description: What is explicitly out of scope?
      placeholder: |
        - apps/
        - services/
        - production deployment config
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What must be true before this can close?
      placeholder: |
        - The implementation stays inside the allowed folders.
        - Relevant docs are updated.
        - Tests or checks are documented.
    validations:
      required: true
  - type: dropdown
    id: risk_level
    attributes:
      label: Risk Level
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: dropdown
    id: recommended_agent_worktree
    attributes:
      label: Recommended Agent / Worktree
      options:
        - 'Review / maintenance - E:\FlowMemory\flowmemory-review'
        - 'Protocol contracts - E:\FlowMemory\flowmemory-contracts'
        - 'Services indexer/verifier - E:\FlowMemory\flowmemory-indexer'
        - 'Apps dashboard/explorer - E:\FlowMemory\flowmemory-dashboard'
        - 'Hardware - E:\FlowMemory\flowmemory-hardware'
        - 'Research - E:\FlowMemory\flowmemory-research'
        - 'Crypto - E:\FlowMemory\flowmemory-crypto'
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Tests Or Verification
      description: What checks should prove this works?
    validations:
      required: false
