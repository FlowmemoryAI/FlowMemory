name: Bug
description: Report a defect in docs, protocol design, services, apps, hardware, crypto, or infra.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Keep the report scoped. Do not include live secrets, private keys, seed phrases, RPC credentials, or exploitable private details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken or incorrect?
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current Behavior
      description: What happens now?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence Or Reproduction
      description: Steps, logs, screenshots, file references, or reasoning.
    validations:
      required: false
  - type: textarea
    id: allowed_folders
    attributes:
      label: Allowed Folders
      description: Which folders may be edited to fix this?
      placeholder: |
        - docs/
        - .github/
    validations:
      required: true
  - type: textarea
    id: forbidden_folders
    attributes:
      label: Forbidden Folders
      description: Which folders must not be edited for this bug?
      placeholder: |
        - contracts/
        - services/
        - apps/
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What must be true before this can close?
      placeholder: |
        - The stale statement is removed.
        - The relevant docs agree with GitHub source of truth.
        - Checks pass.
    validations:
      required: true
  - type: dropdown
    id: risk_level
    attributes:
      label: Risk Level
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: dropdown
    id: recommended_agent_worktree
    attributes:
      label: Recommended Agent / Worktree
      options:
        - 'Review / maintenance'
        - 'Protocol contracts'
        - 'Services indexer/verifier'
        - 'Apps dashboard/explorer'
        - 'Hardware'
        - 'Research'
        - 'Crypto'
    validations:
      required: true
